server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Container healthcheck target — deliberately not the SPA's index.html, so the check doesn't
    # depend on the full asset bundle being intact, only on nginx itself being up.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # React Router uses client-side routing — any path that isn't a real static file must still
    # fall back to index.html, or a hard refresh on e.g. /tickets/123 would 404 at the nginx level.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted assets (Vite's content-hashed filenames) are safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
